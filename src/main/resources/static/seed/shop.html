<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>农场管理系统 - 商店</title>
    <link rel="stylesheet" href="easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="easyui/themes/icon.css">
    <link rel="stylesheet" href="green-theme.css">
    <script src="easyui/jquery.min.js"></script>
    <script src="easyui/jquery.easyui.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; height: 100vh; overflow: hidden; }

        .layout {
            display: flex; flex-direction: column; height: 100vh;
            background-image: url("/images/background.png");
            background-repeat: no-repeat; background-size: cover;
            background-position: center; background-attachment: fixed;
        }
        .top-frame {
            height: 80px; position: relative;
            background: url("/images/topbar.png") repeat-x left center;
            background-size: auto 100%;
        }
        .top-buttons {
            position: absolute; right: 20px; top: 50%;
            transform: translateY(-50%); display: flex; gap: 16px; align-items: center;
        }
        .icon-link {
            width: 40px; height: 40px; display: flex;
            align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer;
            outline: none; flex-shrink: 0;
        }
        .icon-link img { width: 100%; height: 100%; object-fit: contain; }

        .middle-frame {
            flex: 1; overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            background: transparent; padding: 10px;
        }

        /* 用户面板 */
        .user-panel {
            position: absolute; top: 10px; left: 20px; display: flex;
            align-items: center; gap: 10px;
            background: rgba(165, 214, 167, 0.95); padding: 8px 15px;
            border-radius: 8px; border: 1px solid #66bb6a; z-index: 10;
        }
        .user-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            object-fit: cover; background-color: #e0e0e0;
        }
        .user-info { text-align: left; line-height: 1.5; min-width: 180px; font-size: 13px; }

        /* 主容器 */
        .shop-container {
            width: 98%; height: 98%;
            display: flex; flex-direction: column;
            gap: 8px;
        }

        /* 上半部分：种子商城 */
        .shop-upper {
            flex: 6;
            display: flex; flex-direction: column;
            background: rgba(165, 214, 167, 0.6);
            border-radius: 8px; border: 2px solid #66bb6a;
            padding: 12px;
            position: relative;
        }
        .shop-upper-title {
            font-size: 20px; font-weight: bold; color: #1b5e20;
            margin-bottom: 8px;
        }
        .shop-pagination {
            position: absolute; top: 10px; right: 15px;
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; color: #333;
        }
        .shop-pagination button {
            padding: 4px 12px; border: 1px solid #43a047;
            background: #2e7d32; color: #fff; cursor: pointer;
            border-radius: 3px; font-size: 13px;
        }
        .shop-pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

        .seed-card-list {
            flex: 1; display: flex; gap: 18px;
            align-items: stretch;
            justify-content: center;
        }
        .seed-card {
            flex: 0 0 165px;
            display: flex; flex-direction: column; align-items: center;
            background: url("/images/seedStorageFrame.png") no-repeat center;
            background-size: 100% 100%;
            border-radius: 4px;
            padding: 8px 8px 6px 8px;
        }
        .seed-card-img {
            width: 90px; height: 90px; object-fit: contain;
            border-radius: 8px; background: rgba(232,245,233,0.5);
            flex-shrink: 0;
        }
        .seed-card-name {
            font-weight: bold; font-size: 16px; color: #1b5e20;
            margin: 4px 0;
            flex-shrink: 0;
            text-shadow: 0 0 3px rgba(255,255,255,0.9);
        }
        .seed-card-tip {
            flex: 1; font-size: 13px; color: #444;
            text-align: center; overflow: auto;
            min-height: 0; padding: 0 4px;
            line-height: 1.4;
            text-shadow: 0 0 2px rgba(255,255,255,0.7);
        }
        .seed-card-bottom {
            flex-shrink: 0; display: flex; align-items: center;
            gap: 6px; margin-top: 4px;
        }
        .seed-card-price {
            font-size: 16px; color: #333; font-weight: bold;
        }
        .seed-card-price img {
            width: 24px; height: 24px; vertical-align: middle; margin-right: 2px;
        }
        .btn-buy {
            padding: 5px 16px; border: none; border-radius: 5px;
            background: #43a047; color: #fff; cursor: pointer;
            font-size: 14px; font-weight: bold;
        }
        .btn-buy:hover { background: #2e7d32; }
        .btn-buy:disabled { background: #9e9e9e; cursor: not-allowed; }
        .no-seed { flex: 1; text-align: center; color: #999; font-size: 16px; align-self: center; }

        /* 下半部分：已购种子 */
        .shop-lower {
            flex: 4;
            display: flex; flex-direction: column;
            background: rgba(165, 214, 167, 0.6);
            border-radius: 8px; border: 2px solid #66bb6a;
            padding: 12px;
        }
        .shop-lower-title {
            font-size: 18px; font-weight: bold; color: #1b5e20;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .storage-area {
            flex: 1; display: flex; align-items: center;
            justify-content: center; gap: 10px;
            min-height: 0;
        }
        .storage-nav {
            width: 40px; height: 40px; cursor: pointer;
            flex-shrink: 0; object-fit: contain;
            opacity: 0.7;
        }
        .storage-nav:hover { opacity: 1; }
        .storage-nav.disabled { opacity: 0.25; cursor: not-allowed; }
        .storage-seeds {
            flex: 1; display: flex; gap: 12px;
            align-items: center; justify-content: center;
            min-height: 0;
        }
        .storage-item {
            flex: 1; max-width: 120px; text-align: center;
            position: relative;
        }
        .storage-item-img {
            width: 80px; height: 80px; object-fit: contain;
            border-radius: 8px; border: 2px solid #81c784;
            background: #e8f5e9;
        }
        .storage-item-badge {
            position: absolute; top: -5px; right: 10px;
            background: #c62828; color: #fff; font-size: 14px;
            font-weight: bold; width: 26px; height: 26px;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
        }
        .storage-empty {
            flex: 1; text-align: center; color: #999; font-size: 15px;
        }

        .bottom-frame {
            height: 40px;
            background: url("/images/bottom.png") repeat-x left center;
            background-size: auto 100%;
        }

        /* ===== EasyUI 深绿主题 ===== */
        .panel-header { background: #1b5e20 !important; border-color: #2e7d32 !important; }
        .panel-title, .panel-tool { color: #fff !important; }
        .window { border-color: #66bb6a !important; }
        .window .window-body, .messager-body { background: #c8e6c9 !important; }
        .messager-button .l-btn, .dialog-button .l-btn { background: #43a047 !important; border-color: #2e7d32 !important; color: #fff !important; }
        .messager-button .l-btn:hover, .dialog-button .l-btn:hover { background: #2e7d32 !important; }
        .messager-icon-question { background: #c8e6c9 !important; }

        /* 种子悬浮详情浮窗 */
        .seed-tooltip {
            display: none; position: absolute; z-index: 9999;
            width: 240px; padding: 14px 16px;
            background: rgba(27, 94, 32, 0.95); color: #e8f5e9;
            border-radius: 10px; border: 2px solid #81c784;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            font-size: 13px; line-height: 1.8;
            pointer-events: none;
        }
        .seed-tooltip .tt-name {
            font-size: 17px; font-weight: bold; color: #ffd54f;
            border-bottom: 1px solid #66bb6a; padding-bottom: 6px; margin-bottom: 8px;
        }
        .seed-tooltip .tt-row { display: flex; justify-content: space-between; }
        .seed-tooltip .tt-label { color: #a5d6a7; }
        .seed-tooltip .tt-value { color: #fff; font-weight: bold; }
        .seed-tooltip .tt-tip {
            margin-top: 8px; padding-top: 8px; border-top: 1px solid #66bb6a;
            color: #c8e6c9; font-size: 12px; line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="top-frame">
        <div class="user-panel" id="userPanel">
            <img class="user-avatar" id="userAvatar" src="/images/unknownUser.png" alt="头像">
            <div class="user-info">
                <div><strong id="currentNickname">未登录</strong></div>
                <div>金币：<span id="currentGold">0</span>&nbsp;积分：<span id="currentPoints">0</span></div>
            </div>
        </div>
        <div class="top-buttons">
            <a href="index.html" class="icon-link" id="switchUserBtn" title="切换用户">
                <img src="/images/userSelect.png" alt="切换用户">
            </a>
            <a href="farm.html" class="icon-link" title="农场种植">
                <img src="/images/farmLands.png" alt="农场种植">
            </a>
            <a href="shop.html" class="icon-link" title="商店">
                <img src="/images/buySeed.png" alt="商店">
            </a>
            <a href="player.html" class="icon-link" title="用户管理">
                <img src="/images/userManager.png" alt="用户管理">
            </a>
            <a href="seed.html" class="icon-link" title="图鉴">
                <img src="/images/seedManager.png" alt="图鉴">
            </a>
        </div>
    </div>

    <div class="middle-frame">
        <div class="shop-container">
            <!-- 上半：种子商城 -->
            <div class="shop-upper">
                <div class="shop-upper-title">种子商城</div>
                <div class="shop-pagination">
                    <button id="shopPrevBtn" onclick="shopPrevPage()">上一页</button>
                    <span id="shopPageInfo">第 1 页</span>
                    <button id="shopNextBtn" onclick="shopNextPage()">下一页</button>
                </div>
                <div class="seed-card-list" id="seedCardList">
                    <div class="no-seed">加载中...</div>
                </div>
            </div>

            <!-- 下半：已购种子 -->
            <div class="shop-lower">
                <div class="shop-lower-title">我的种子仓库</div>
                <div class="storage-area">
                    <img src="/images/pre.png" class="storage-nav" id="storagePrev" onclick="storagePrevPage()" alt="上一组">
                    <div class="storage-seeds" id="storageSeeds">
                        <div class="storage-empty">暂无种子，去商城购买吧</div>
                    </div>
                    <img src="/images/next.png" class="storage-nav" id="storageNext" onclick="storageNextPage()" alt="下一组">
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-frame"></div>
</div>

<!-- 种子悬浮详情浮窗 -->
<div class="seed-tooltip" id="seedTooltip"></div>

<script>
    var shopPage = 1, shopTotalPages = 1, mySeeds = [], storagePage = 0;
    var pageSize = 4;
    var shopLoading = false, storageLoading = false;
    var seedDataMap = {};  // 缓存当前页种子详情，供悬浮浮窗使用

    $(function() {
        loadCurrentPlayer();
        loadShopSeeds();
        loadMySeeds();
    });

    function loadCurrentPlayer() {
        $.ajax({
            url: '/player/current', type: 'GET', dataType: 'json',
            success: function(res) {
                if (res && res.code === 0 && res.data) {
                    updateUserPanel(res.data);
                }
            },
            error: function() {}
        });
    }

    function updateUserPanel(player) {
        $('#currentNickname').text(player.nickname || '未登录');
        $('#currentGold').text(player.gold || 0);
        $('#currentPoints').text(player.points || 0);
        if (player.avatarUrl) {
            $('#userAvatar').attr('src', player.avatarUrl);
        } else {
            $('#userAvatar').attr('src', '/images/unknownUser.png');
        }
    }

    // ========== 种子商城 ==========
    function loadShopSeeds() {
        if (shopLoading) return;
        shopLoading = true;
        $('#shopPrevBtn, #shopNextBtn').prop('disabled', true);
        $('#shopPageInfo').text('加载中...');
        $.ajax({
            url: '/shop/seeds', type: 'GET', dataType: 'json',
            data: { page: shopPage, rows: pageSize },
            timeout: 5000,
            success: function(data) {
                var rows = data.rows || [];
                var total = data.total || 0;
                shopTotalPages = Math.ceil(total / pageSize) || 1;
                if (shopPage > shopTotalPages) { shopPage = shopTotalPages; }
                if (shopPage < 1) { shopPage = 1; }
                renderSeedCards(rows);
                $('#shopPageInfo').text('第 ' + shopPage + ' 页 / 共 ' + shopTotalPages + ' 页');
                $('#shopPrevBtn').prop('disabled', shopPage <= 1);
                $('#shopNextBtn').prop('disabled', shopPage >= shopTotalPages);
            },
            error: function(xhr, status) {
                if (status !== 'abort') $.messager.alert('错误', '加载种子失败');
            },
            complete: function() { shopLoading = false; }
        });
    }

    function renderSeedCards(rows) {
        var $container = $('#seedCardList');
        if (!rows.length) { $container.html('<div class="no-seed">暂无种子</div>'); return; }
        var html = '';
        rows.forEach(function(s) {
            seedDataMap[s.id] = s;  // 缓存到全局 map
            html += '<div class="seed-card" data-seed-id="' + s.id + '">'
                + '<img src="' + s.matureImage + '" class="seed-card-img" onerror="this.src=\'/images/unknownUser.png\'">'
                + '<div class="seed-card-name">' + escapeHtml(s.seedName || '') + '</div>'
                + '<div class="seed-card-tip">' + escapeHtml(s.tipInfo || '暂无介绍') + '</div>'
                + '<div class="seed-card-bottom">'
                + '<span class="seed-card-price"><img src="/images/gold.png">' + (s.purchasePrice || 0) + '</span>'
                + '<button class="btn-buy" onclick="buySeed(' + s.id + ', this)">我要购买</button>'
                + '</div>'
                + '</div>';
        });
        // fill missing cards to keep layout stable
        for (var i = rows.length; i < pageSize; i++) {
            html += '<div class="seed-card" style="visibility:hidden;"></div>';
        }
        $container.html(html);

        // 绑定悬浮事件
        $container.find('.seed-card[data-seed-id]').each(function() {
            var $card = $(this);
            var seedId = parseInt($card.attr('data-seed-id'));
            $card.on('mouseenter', function(e) {
                showSeedTooltip(seedDataMap[seedId], $card);
            }).on('mouseleave', function() {
                $('#seedTooltip').hide();
            }).on('mousemove', function(e) {
                var tip = $('#seedTooltip');
                if (tip.is(':visible')) {
                    var top = e.clientY + 12;
                    var left = e.clientX + 15;
                    if (left + tip.outerWidth() > $(window).width()) {
                        left = e.clientX - tip.outerWidth() - 15;
                    }
                    tip.css({ top: top + 'px', left: left + 'px' });
                }
            });
        });
    }

    function showSeedTooltip(s, $card) {
        var levelMap = { 1: '⭐', 2: '⭐⭐', 3: '⭐⭐⭐', 4: '⭐⭐⭐⭐', 5: '⭐⭐⭐⭐⭐' };
        var stars = levelMap[s.seedLevel] || s.seedLevel || '—';
        var typeStr = s.seedType || '—';
        var seasonStr = s.xSeasonCrop || '—';
        var matureStr = s.maturityTime ? s.maturityTime + ' 分钟' : '—';
        var harvestStr = s.harvestCount != null ? s.harvestCount + ' 个' : '—';
        var fruitPriceStr = s.fruitPrice != null ? s.fruitPrice + ' 金币' : '—';
        var landStr = s.landRequirement || '—';
        var expStr = s.experience != null ? '+' + s.experience : '—';
        var tipStr = s.tipInfo || '暂无介绍';

        var html = '<div class="tt-name">' + escapeHtml(s.seedName) + '</div>'
            + '<div class="tt-row"><span class="tt-label">等级</span><span class="tt-value">' + stars + '</span></div>'
            + '<div class="tt-row"><span class="tt-label">类型</span><span class="tt-value">' + escapeHtml(typeStr) + '</span></div>'
            + '<div class="tt-row"><span class="tt-label">季节</span><span class="tt-value">' + escapeHtml(seasonStr) + '</span></div>'
            + '<div class="tt-row"><span class="tt-label">成熟时间</span><span class="tt-value">' + matureStr + '</span></div>'
            + '<div class="tt-row"><span class="tt-label">收获数量</span><span class="tt-value">' + harvestStr + '</span></div>'
            + '<div class="tt-row"><span class="tt-label">果实单价</span><span class="tt-value">' + fruitPriceStr + '</span></div>'
            + '<div class="tt-row"><span class="tt-label">土地要求</span><span class="tt-value">' + escapeHtml(landStr) + '</span></div>'
            + '<div class="tt-row"><span class="tt-label">经验值</span><span class="tt-value">' + expStr + '</span></div>'
            + '<div class="tt-tip">📝 ' + escapeHtml(tipStr) + '</div>';

        var $tip = $('#seedTooltip');
        $tip.html(html).show();

        // 初始定位在卡片右侧
        var offset = $card.offset();
        var cardW = $card.outerWidth();
        var tipW = $tip.outerWidth();
        var left = offset.left + cardW + 8;
        if (left + tipW > $(window).width()) {
            left = offset.left - tipW - 8;
        }
        var top = offset.top;
        $tip.css({ top: top + 'px', left: left + 'px' });
    }

    function shopPrevPage() {
        if (shopLoading || shopPage <= 1) return;
        shopPage--;
        loadShopSeeds();
    }
    function shopNextPage() {
        if (shopLoading || shopPage >= shopTotalPages) return;
        shopPage++;
        loadShopSeeds();
    }

    // ========== 购买逻辑 ==========
    function buySeed(seedId, btn) {
        $.ajax({
            url: '/player/current', type: 'GET', dataType: 'json',
            success: function(res) {
                if (!res || res.code !== 0 || !res.data) {
                    $.messager.alert('提示', '请先在首页登录后再购买！');
                    return;
                }
                // 从缓存取种子信息用作确认提示
                var info = seedDataMap[seedId];
                var seedName = info ? info.seedName : '该种子';
                var price = info ? info.purchasePrice : '?';
                var gold = res.data.gold || 0;
                $.messager.confirm('购买确认',
                    '确定要购买【' + seedName + '】吗？\n价格：' + price + ' 金币 ｜ 当前拥有：' + gold + ' 金币',
                    function(r) {
                        if (r) doBuy(seedId, btn);
                    });
            },
            error: function() {
                $.messager.alert('提示', '请先在首页登录后再购买！');
            }
        });
    }

    function doBuy(seedId, btn) {
        $(btn).prop('disabled', true).text('购买中...');
        $.ajax({
            url: '/shop/buy', type: 'POST', data: { seedId: seedId }, dataType: 'json',
            success: function(result) {
                if (result.code === 200) {
                    $.messager.show({ title: '成功', msg: '购买成功！' });
                    $('#currentGold').text(result.data);
                    loadMySeeds();
                } else {
                    $.messager.alert('提示', result.msg);
                }
                $(btn).prop('disabled', false).text('我要购买');
            },
            error: function() {
                $.messager.alert('错误', '购买失败，请重试');
                $(btn).prop('disabled', false).text('我要购买');
            }
        });
    }

    // ========== 我的种子仓库 ==========
    function loadMySeeds() {
        storageLoading = true;
        $.ajax({
            url: '/shop/mySeeds', type: 'GET', dataType: 'json',
            timeout: 5000,
            success: function(data) {
                mySeeds = data || [];
                if (storagePage * pageSize >= mySeeds.length) storagePage = 0;
                renderStorage();
            },
            error: function(xhr, status) {
                mySeeds = [];
                renderStorage();
                if (status !== 'abort') $.messager.alert('错误', '加载种子仓库失败');
            },
            complete: function() { storageLoading = false; }
        });
    }

    function renderStorage() {
        if (!mySeeds.length) {
            $('#storageSeeds').html('<div class="storage-empty">暂无种子，去商城购买吧</div>');
            $('#storagePrev').addClass('disabled');
            $('#storageNext').addClass('disabled');
            return;
        }
        var start = storagePage * pageSize;
        var end = Math.min(start + pageSize, mySeeds.length);
        var visible = mySeeds.slice(start, end);
        var html = '';
        visible.forEach(function(s) {
            var qty = s.quantity || 0;
            var badgeStyle = qty > 0 ? '' : 'style="background:#9e9e9e;"';
            var imgStyle = qty > 0 ? '' : 'style="opacity:0.4;"';
            html += '<div class="storage-item" title="' + escapeHtml(s.seedName || '') + '">'
                + '<img src="' + s.image + '" class="storage-item-img" ' + imgStyle + ' onerror="this.src=\'/images/unknownUser.png\'">'
                + '<div class="storage-item-badge" ' + badgeStyle + '>' + qty + '</div>'
                + '<div style="font-size:10px;color:#666;margin-top:2px;text-align:center;">' + escapeHtml(s.seedName || '') + '</div>'
                + '</div>';
        });
        for (var i = visible.length; i < pageSize; i++) {
            html += '<div class="storage-item" style="visibility:hidden;"><img src="/images/unknownUser.png" class="storage-item-img"></div>';
        }
        $('#storageSeeds').html(html);

        var totalPages = Math.ceil(mySeeds.length / pageSize);
        if (storagePage > 0) {
            $('#storagePrev').removeClass('disabled');
        } else {
            $('#storagePrev').addClass('disabled');
        }
        if (storagePage < totalPages - 1) {
            $('#storageNext').removeClass('disabled');
        } else {
            $('#storageNext').addClass('disabled');
        }
    }

    function storagePrevPage() {
        if (storageLoading || storagePage <= 0) return;
        storagePage--;
        renderStorage();
    }
    function storageNextPage() {
        var totalPages = Math.ceil(mySeeds.length / pageSize) || 1;
        if (storageLoading || storagePage >= totalPages - 1) return;
        storagePage++;
        renderStorage();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
</script>
</body>
</html>
