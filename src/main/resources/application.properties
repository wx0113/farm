spring.application.name=practice



# ?????
server.port=8080
# ?????
server.servlet.context-path=/

# ??????
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-message=always
server.error.include-path=always
server.error.include-stacktrace=always

# log configuration
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.me.spring=DEBUG
# logging.output-file=logs/application.log

# springdoc
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=cn.jxufe
springdoc.swagger-ui.path=/test

# ?????????????
spring.servlet.multipart.max-file-size=5MB
# ????????????????
spring.servlet.multipart.max-request-size=20MB
# ??Web????????????-1?????
server.tomcat.max-swallow-size=-1

# 数据库

# 阿里巴巴druid连接池

spring.datasource.type=com.alibaba.druid.pool.DruidDataSource

# 数据库连接信息

spring.datasource.url=jdbc:postgresql://localhost:5432/farm_db

spring.datasource.username=postgres

spring.datasource.password=123456

spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.naming.physical-strategy=cn.jxufe.database.PostgreSQLServerNamingStrategy