<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>种子管理</title>
    <!-- EasyUI 基础样式和图标 -->
    <link rel="stylesheet" href="easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="easyui/themes/icon.css">
    <link rel="stylesheet" href="green-theme.css">
    <!-- jQuery 和 EasyUI 核心脚本 -->
    <script src="easyui/jquery.min.js"></script>
    <script src="easyui/jquery.easyui.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; height: 100vh; overflow: hidden; }

        /* 工具栏按钮样式 */
        #toolbar .easyui-linkbutton .l-btn-text { color: #f4f4f4 !important; }
        #toolbar .easyui-linkbutton .l-btn-icon { background-color: transparent !important; }
        #toolbar .btn-add { background: #4CAF50 !important; }
        #toolbar .btn-edit { background: #afad4c !important; }
        #toolbar .btn-delete { background: #4ca0af !important; }
        #toolbar .btn-save { background: #4c54af !important; }
        #toolbar .btn-refresh { background: #af4c72 !important; }

        /* 表格容器样式 */
        .seed-container {
            width: 98%; height: 98%;
            display: flex; flex-direction: column;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            background: #a5d6a7;
            border-radius: 4px;
            border: 1px solid #66bb6a;
            padding: 10px;
        }
        .seed-header {
            flex-shrink: 0;
        }
        .seed-grid-wrapper {
            flex: 1;
            min-height: 0;
        }
        h2 {
            color: #333;
            margin: 0 0 8px 0;
            font-size: 18px;
        }
        #toolbar {
            padding: 8px;
            background: #1b5e20;
            border-radius: 4px 4px 0 0;
            margin: 0;
            flex-shrink: 0;
        }
        /* 所有 datagrid 表头统一样式 */
        .datagrid-header-row td {
            background: #1b5e20 !important;
            color: #fff !important;
            font-weight: bold;
            border-right: 1px solid #2e7d32 !important;
        }
        /* 分页栏 */
        .datagrid-pager {
            background: #2e7d32 !important;
        }
        .datagrid-pager a {
            color: #fff !important;
        }
        /* 表格行基础底色 */
        .datagrid-row td {
            background: #c8e6c9 !important;
            color: #333 !important;
        }
        /* 偶数行用另一种绿区分 */
        .datagrid-row:nth-child(even) td {
            background: #a5d6a7 !important;
        }
        /* 选中行高亮 - 淡黄色 */
        .datagrid-row.datagrid-row-selected {
            background: #fff9c4 !important;
        }
        .datagrid-row.datagrid-row-selected td {
            background: #fff9c4 !important;
            color: #333 !important;
        }
        /* 行悬浮 - 更深绿 */
        .datagrid-row:hover td {
            background: #81c784 !important;
        }
        /* 整体布局样式 */
        .layout {
            display: flex; flex-direction: column; height: 100vh;
            background-image: url("/images/background.png");
            background-repeat: no-repeat; background-size: cover;
            background-position: center; background-attachment: fixed;
        }
        .top-frame {
            height: 80px; position: relative;
            background: url("/images/topbar.png") repeat-x left center;
            background-size: auto 100%;
        }
        /* 用户面板样式 */
        .user-panel {
            position: absolute; top: 10px; left: 20px; display: flex;
            align-items: center; gap: 10px;
            background: rgba(165, 214, 167, 0.95); padding: 8px 15px;
            border-radius: 8px; border: 1px solid #66bb6a; z-index: 10;
        }
        .user-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            object-fit: cover; background-color: #e0e0e0;
        }
        .user-info { text-align: left; line-height: 1.5; min-width: 160px; }
        .item-img {
            width: 32px; height: 32px; border-radius: 50%;
            margin-right: 8px; vertical-align: middle;
        }
        /* 顶部按钮组 */
        .top-buttons {
            position: absolute; right: 20px; top: 50%;
            transform: translateY(-50%); display: flex; gap: 16px; align-items: center;
        }
        .icon-link {
            width: 40px; height: 40px; display: flex;
            align-items: center; justify-content: center;
            text-decoration: none; cursor: pointer;
            outline: none; flex-shrink: 0;
        }
        .icon-link img { width: 100%; height: 100%; object-fit: contain; }
        /* 中间内容区 */
        .middle-frame {
            flex: 1; overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            background: transparent; padding: 10px;
        }
        /* 底部栏 */
        .bottom-frame {
            height: 40px;
            background: url("/images/bottom.png") repeat-x left center;
            background-size: auto 100%;
        }

        /* ===== EasyUI 深绿主题 ===== */
        .panel-header { background: #1b5e20 !important; border-color: #2e7d32 !important; }
        .panel-title, .panel-tool { color: #fff !important; }
        .window { border-color: #66bb6a !important; }
        .window .window-body, .messager-body { background: #c8e6c9 !important; }
        .messager-button .l-btn, .dialog-button .l-btn { background: #43a047 !important; border-color: #2e7d32 !important; color: #fff !important; }
        .messager-button .l-btn:hover, .dialog-button .l-btn:hover { background: #2e7d32 !important; }
        .messager-icon-question { background: #c8e6c9 !important; }

        #tools-imagePositioner-container {
            width: 440px;
            height: 440px;
            border: 1px solid #66bb6a;
            background-color: #c8e6c9;
            position: relative;
            overflow: hidden;
        }
        #positionBg {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #stageOverlay {
            position: absolute;
            cursor: move;
            z-index: 10;
            border: 2px dashed #ff0000;
            box-shadow: 0 0 6px rgba(255,0,0,0.5);
        }
        /* 图片定位工具样式 */
        .tools-imagePositioner-display {
            width: 200px; height: 300px; border: 1px solid #ccc;
            overflow: hidden; margin-bottom: 10px;
        }
        .tools-imagePositioner-display img { width: 100%; height: auto; }

        /* 搜索框样式 */
        .search-box {
            padding: 2px 6px; width: 160px; border: 1px solid #ccc;
            border-radius: 3px; font-size: 12px; outline: none;
        }
        /* 成长阶段按钮样式 */
        .stage-btn {
            display: inline-block;
            padding: 4px 12px;
            background: #43a047;
            color: #fff !important;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
        }
        .stage-btn:hover {
            background: #2e7d32;
            color: #fff !important;
        }
        /* 工具栏分隔符 */
        .toolbar-separator {
            display: inline-block; width: 1px; height: 24px;
            background: #ddd; margin: 0 5px; vertical-align: middle;
        }
        /* 表格单元格自动换行 */
        .datagrid-cell { white-space: normal !important; word-wrap: break-word !important; word-break: break-word !important; height: auto !important; }
        .datagrid-cell-c1-tips { padding: 6px 10px !important; }
    </style>
</head>
<body>
<div class="layout">
    <!-- 顶部栏 -->
    <div class="top-frame">
        <div class="user-panel" id="userPanel">
            <img class="user-avatar" id="userAvatar" src="/images/unknownUser.png" alt="头像">
            <div class="user-info">
                <div><strong id="currentNickname">未知用户</strong></div>
                <div>经验：<span id="currentExp">0</span>金币：<span id="currentGold">0</span>积分：<span id="currentPoints">0</span></div>
            </div>
        </div>
        <div class="top-buttons">
            <a href="javascript:void(0)" class="icon-link" id="switchUserBtn" title="切换用户">
                <img src="/images/userSelect.png" alt="切换用户">
            </a>
            <a href="farm.html" class="icon-link" title="农场种植">
                <img src="/images/farmLands.png" alt="农场种植">
            </a>
            <a href="shop.html" class="icon-link" title="商店">
                <img src="/images/buySeed.png" alt="商店">
            </a>
            <a href="player.html" class="icon-link" title="用户管理">
                <img src="/images/userManager.png" alt="用户管理">
            </a>
            <a href="seed.html" class="icon-link" title="图鉴">
                <img src="/images/seedManager.png" alt="图鉴">
            </a>
        </div>
    </div>

    <!-- 中间内容区 -->
    <div class="middle-frame">
        <div class="seed-container">
            <div class="seed-header">
                <h2>种子清单</h2>
            </div>
            <!-- 操作工具栏 -->
            <div id="toolbar">
                <span style="display:inline-block;vertical-align:middle;margin-right:10px;">
                    <label style="font-size:12px;color:#f4f4f4;">种子查询：</label>
                    <input class="search-box" id="searchKeyword" placeholder="输入种子ID或名称（如西瓜）" />
                    <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-search" plain="true" onclick="searchById()" style="margin-left:3px;">查询</a>
                    <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-clear" plain="true" onclick="clearSearch()" style="margin-left:3px;">清空</a>
                </span>
                <span class="toolbar-separator"></span>
                <a href="javascript:void(0)" class="easyui-linkbutton btn-add" iconCls="icon-add" plain="true" onclick="newRecord()">添加</a>
                <a href="javascript:void(0)" class="easyui-linkbutton btn-edit" iconCls="icon-edit" plain="true" onclick="editRow()">编辑</a>
                <a href="javascript:void(0)" class="easyui-linkbutton btn-delete" iconCls="icon-remove" plain="true" onclick="deleteRow()">删除</a>
                <a href="javascript:void(0)" class="easyui-linkbutton btn-save" iconCls="icon-save" plain="true" onclick="saveAllEdits()">保存</a>
                <a href="javascript:void(0)" class="easyui-linkbutton btn-refresh" iconCls="icon-reload" plain="true" onclick="refreshData()">刷新</a>
            </div>
            <!-- 种子数据表格 -->
            <div class="seed-grid-wrapper">
                <table id="seedGrid"></table>
            </div>

            <!-- 种子编辑弹窗 -->
            <div id="formContainer" class="easyui-dialog" style="width:450px;padding:20px"
                 closed="true" buttons="#formButtons" modal="true">
                <form id="formEditor" method="post" novalidate>
                    <table cellpadding="5">
                        <tr><td>种子ID:</td><td><input class="easyui-textbox" name="id" id="formSeedId" style="width:100%"></td></tr>
                        <tr><td>种子名称:</td><td><input class="easyui-textbox" name="seedName" required="true"></td></tr>
                        <tr><td>X季作物:</td><td>
                            <select class="easyui-combobox" name="xSeasonCrop" panelHeight="auto" style="width:100%">
                                <option value="1季作物">1季作物</option>
                                <option value="2季作物">2季作物</option>
                                <option value="3季作物">3季作物</option>
                            </select>
                        </td></tr>
                        <tr><td>种子等级:</td><td><input class="easyui-numberspinner" name="seedLevel" value="1" min="1" max="100"></td></tr>
                        <tr><td>种子类型:</td><td>
                            <select class="easyui-combobox" name="seedType" panelHeight="auto" style="width:100%">
                                <option value="水果">水果</option>
                                <option value="蔬菜">蔬菜</option>
                                <option value="谷物">谷物</option>
                            </select>
                        </td></tr>
                        <tr><td>可获经验:</td><td><input class="easyui-numberspinner" name="experience" value="0"></td></tr>
                        <tr><td>成熟时间(秒):</td><td><input class="easyui-numberspinner" name="maturityTime" value="0"></td></tr>
                        <tr><td>可获收成:</td><td><input class="easyui-numberspinner" name="harvestCount" value="0"></td></tr>
                        <tr><td>采购价:</td><td><input class="easyui-numberbox" name="purchasePrice" precision="2" value="0.00"></td></tr>
                        <tr><td>果实单价:</td><td><input class="easyui-numberbox" name="fruitPrice" precision="2" value="0.00"></td></tr>
                        <tr><td>土地需求:</td><td>
                            <select class="easyui-combobox" name="landRequirement" panelHeight="auto" style="width:100%">
                                <option value="黄土地">黄土地</option>
                                <option value="黑土地">黑土地</option>
                                <option value="金土地">金土地</option>
                                <option value="沙土地">沙土地</option>
                            </select>
                        </td></tr>
                        <tr><td>可获积分:</td><td><input class="easyui-numberspinner" name="points" value="0"></td></tr>
                        <tr><td>小贴士:</td><td><input class="easyui-textbox" name="tipInfo" multiline="true" style="width:100%;height:60px;"></td></tr>
                    </table>
                </form>
            </div>
            <div id="formButtons">
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-ok" onclick="saveRecord()">保存</a>
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-cancel" onclick="$('#formContainer').dialog('close')">取消</a>
            </div>

            <!-- 成长阶段管理弹窗 -->
            <div id="stageDialog" class="easyui-dialog" style="width:850px;height:500px;padding:10px"
                 closed="true" modal="true" title="🌱 成长阶段管理" buttons="#stageDialogButtons">
                <table id="stageGrid" class="easyui-datagrid" style="width:100%;height:380px"
                       data-options="fitColumns:true,rownumbers:true,singleSelect:true,pagination:false,method:'get'">
                    <thead>
                    <tr>
                        <th data-options="field:'stageOrder',width:60,align:'center'">阶段</th>
                        <th data-options="field:'stageTitle',width:120,align:'center'">阶段标题</th>
                        <th data-options="field:'stageDuration',width:100,align:'right',formatter:formatSeconds">时长</th>
                        <th data-options="field:'pestProbability',width:100,align:'right'">生虫概率</th>
                        <th data-options="field:'imageWidth',width:60,align:'center'">宽度</th>
                        <th data-options="field:'imageHeight',width:60,align:'center'">高度</th>
                        <th data-options="field:'imageOffsetX',width:60,align:'center'">OX</th>
                        <th data-options="field:'imageOffsetY',width:60,align:'center'">OY</th>
                        <th data-options="field:'cropStatus',width:80,align:'center'">状态</th>
                    </tr>
                    </thead>
                </table>
            </div>
            <div id="stageDialogButtons">
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-add" onclick="addStageRow()">添加</a>
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-edit" onclick="editStageRow()">编辑</a>
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-remove" onclick="removeStageRow()">删除</a>
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-save" onclick="saveStageData()">保存</a>
            </div>

            <!-- 成长阶段编辑弹窗 -->
            <div id="stageFormDialog" class="easyui-dialog" style="width:480px;padding:20px"
                 closed="true" modal="true" title="🌿 成长阶段详情" buttons="#stageFormButtons">
                <form id="stageEditorForm" method="post" novalidate>
                    <input type="hidden" name="id">
                    <input type="hidden" name="seedId" id="stageSeedId">
                                        <table cellpadding="8">
                        <tr><td>阶段序号:</td><td><input class="easyui-numberspinner" name="stageOrder" data-options="min:0,max:10" style="width:100%"></td></tr>
                        <tr><td>阶段标题:</td><td><input class="easyui-textbox" name="stageTitle" style="width:100%"></td></tr>
                        <tr><td>阶段时长(秒):</td><td><input class="easyui-numberspinner" name="stageDuration" style="width:100%"></td></tr>
                        <tr><td>生虫概率:</td><td><input class="easyui-numberbox" name="pestProbability" precision="2" min="0" max="1" style="width:100%"></td></tr>
                        <input type="hidden" name="imageUrl">
                        <tr><td>图片宽度:</td><td><input class="easyui-numberspinner" name="imageWidth" style="width:100%"></td></tr>
                        <tr><td>图片高度:</td><td><input class="easyui-numberspinner" name="imageHeight" style="width:100%"></td></tr>
                        <tr><td>offsetX:</td><td><input class="easyui-numberspinner" name="imageOffsetX" style="width:100%"></td></tr>
                        <tr><td>offsetY:</td><td><input class="easyui-numberspinner" name="imageOffsetY" style="width:100%"></td></tr>
                        <tr><td>作物状态:</td><td>
                            <select class="easyui-combobox" name="cropStatus" panelHeight="auto" style="width:100%">
                                <option value="正常">正常</option>
                                <option value="病害">病害</option>
                                <option value="枯萎">枯萎</option>
                                <option value="收获期">收获期</option>
                            </select>
                        </td></tr>
                        <tr><td></td><td><a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-edit" onclick="openImagePositioner()">编辑图片位置</a></td></tr>
                    </table>
                </form>
            </div>
            <div id="stageFormButtons">
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-ok" onclick="saveStageForm()">保存</a>
                <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-cancel" onclick="$('#stageFormDialog').dialog('close')">取消</a>
            </div>

            <!-- 图片位置编辑弹窗 -->
            <div id="positionDialog" class="easyui-dialog" title="作物定位" style="width:520px;height:550px;padding:10px" closed="true">
                <div id="tools-imagePositioner-container">
                    <!-- 底层：positioning.png 基底 -->
                    <img id="positionBg" style="width:100%; height:100%; object-fit:contain;">
                    <!-- 上层：阶段作物图片（可拖拽+缩放） -->
                    <img id="stageOverlay" style="position:absolute; cursor:move; z-index:10;">
                </div>
                <div style="text-align:center;padding-top:12px;">
                    <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-ok" id="btnCropConfirm">确定</a>
                    <a href="javascript:void(0)" class="easyui-linkbutton" iconCls="icon-cancel" id="btnCropCancel">取消</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部栏 -->
    <div class="bottom-frame"></div>
</div>

<!-- 用户切换弹窗 -->
<div id="userSelectDialog" class="easyui-dialog" title="用户选择" closed="true" style="width:400px;padding:20px;z-index:9999;" buttons="#dlgUserButtons">
    <div style="margin-bottom:15px;"><span style="font-weight:bold;">选择用户：</span><input id="userCombo" style="width:200px;"></div>
    <div style="text-align:center;font-size:12px;color:#666;">请在下拉框中选择用户昵称，并点击"确认"按钮切换用户。</div>
</div>
<div id="dlgUserButtons">
    <a href="javascript:void(0)" class="easyui-linkbutton" id="confirmUserBtn" data-options="iconCls:'icon-ok'">确认</a>
    <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-cancel'" onclick="$('#userSelectDialog').dialog('close')">取消</a>
</div>

<script>
    // 全局变量
    var grid = $("#seedGrid");
    var currentSeedId = null;
    var currentStageCropStatus = ''; // 跟踪当前编辑阶段的 cropStatus，用于定位器判断枯萎

    // 格式化秒数为时分秒 (HH:MM:SS)
    function formatSeconds(value) {
        if (!value && value !== 0) return '';
        var h = Math.floor(value / 3600);
        var m = Math.floor((value % 3600) / 60);
        var s = value % 60;
        return (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    }

    // 格式化价格为带金币单位的字符串
    function formatPrice(value) {
        return value != null && value !== '' ? parseFloat(value).toFixed(2) + ' 金币' : '0.00 金币';
    }

    // 格式化积分为带分单位的字符串
    function formatPoints(value) {
        return value != null && value !== '' ? parseInt(value) + ' 分' : '0 分';
    }

    // 操作列格式化函数（成长阶段按钮样式）
    function actionFormatter(value, row) {
        return '<a href="javascript:void(0)" class="stage-btn" onclick="openGrowthStages(' + row.id + ')">成长阶段</a>';
    }

    // 页面初始化
    $(function() {
        // 初始化用户选择下拉框
        $('#userCombo').combobox({
            valueField: 'nickname', textField: 'nickname',
            formatter: function(row) {
                var avatarFile = row.avatarUrl ? row.avatarUrl : '//images/unknownUser.png';
                return '<div style="display:flex;align-items:center;gap:10px;">'
                    + '<img class="item-img" src="' + avatarFile + '" />'
                    + '<div>'
                    + '<span style="font-weight:bold;">' + (row.nickname || '') + '</span>'
                    + '<div style="font-size:11px;color:#555;margin-top:2px;">'
                    + '经验:' + (row.exp || 0) + ' | 金币:' + (row.gold || 0) + ' | 积分:' + (row.points || 0)
                    + '</div></div></div>';
            }
        });

        // 绑定切换用户按钮事件 — 跳转至首页登录
        $('#switchUserBtn').bind('click', function() {
            window.location.href = 'index.html';
        });

        // 绑定确认切换用户按钮事件
        $('#confirmUserBtn').bind('click', function() {
            var selectedUser = $('#userCombo').combobox('getValue');
            if (!selectedUser) { $.messager.alert('提示', '请先选择一个角色', 'warning'); return; }
            $.ajax({
                url: '/player/findByNickname', type: 'GET', data: { nickname: selectedUser }, dataType: 'json',
                success: function(player) {
                    if (player) {
                        $.ajax({
                            url: '/setCurUser', type: 'POST', contentType: 'application/json',
                            data: JSON.stringify(player), dataType: 'json',
                            success: function(response) {
                                if (response.code === 0) {
                                    updateUserPanel(response.data);
                                    $('#userSelectDialog').dialog('close');
                                    $.messager.show({ title: '成功', msg: '已切换为：' + response.data.nickname });
                                }
                            }
                        });
                    }
                }
            });
        });

        // 加载当前登录用户信息
        loadCurrentPlayer();

    // 计算 positioning.png 中土地区域的显示坐标（440×440 容器内）
    // positioning.png: 200×300，土地在底部（与 land.png 201×102 对应，约占底部 102/300）
    function getPositionerLandArea() {
        var cw = 440, ch = 440;
        var imgW = 200, imgH = 300;
        var imgRatio = imgW / imgH;       // 0.667
        // 图比容器瘦 → 填满高度，左右留白
        var displayH = ch;                // 440
        var displayW = cw * imgRatio;     // 293
        var offsetLeft = (cw - displayW) / 2; // 74
        // 土地在图片底部，占 102/300（与 land.png 高度一致）
        var landImgTop = (imgH - 102) / imgH;   // 0.66
        var landImgHeight = 102.0 / imgH;        // 0.34
        var landTop = landImgTop * displayH;     // 290
        var landHeight = landImgHeight * displayH; // 150
        return { left: offsetLeft, top: Math.round(landTop), width: Math.round(displayW), height: Math.round(landHeight) };
    }

    // 拖拽/缩放时自动同步像素值到表单（相对于土地区域左上角，允许超出土地区域）
    function updateFormFromOverlay() {
        var overlay = $('#stageOverlay');
        var w = overlay.width();
        var h = overlay.height();
        var x = parseInt(overlay.css('left')) || 0;
        var y = parseInt(overlay.css('top')) || 0;

        var land = getPositionerLandArea();
        // offsetX/offsetY = 容器坐标 - 土地区域左上角（可以为负数，表示在土地区域上方/左侧）
        var rx = x - land.left;
        var ry = y - land.top;
        var nx = Math.round(rx);
        var ny = Math.round(ry);
        var nw = Math.round(w);
        var nh = Math.round(h);

        // 同步到表单：同时更新底层 input 和 EasyUI numberspinner 显示
        setSpinnerValue('imageWidth', nw);
        setSpinnerValue('imageHeight', nh);
        setSpinnerValue('imageOffsetX', nx);
        setSpinnerValue('imageOffsetY', ny);
    }

    // 从表单读取像素值（兼容 EasyUI numberspinner 和普通 input）
    function getSpinnerValue(name) {
        var $el = $('#stageEditorForm input[name="' + name + '"]');
        // 优先用 EasyUI numberspinner 的 getValue
        try {
            var v = $el.numberspinner('getValue');
            if (v !== null && v !== undefined && v !== '') return parseInt(v);
        } catch(e) {}
        // 降级：直接读 DOM value
        var raw = $el.val();
        return (raw !== null && raw !== undefined && raw !== '') ? parseInt(raw) : null;
    }

    // 同时更新 EasyUI numberspinner 显示和底层 input 值，确保表单 serializeArray 能读到
    function setSpinnerValue(name, val) {
        var $el = $('#stageEditorForm input[name="' + name + '"]');
        // 先更新底层 DOM 值（保证 serializeArray 读取正确）
        $el.val(val);
        // 再通知 EasyUI 刷新显示
        try { $el.numberspinner('setValue', val); } catch(e) {}
        // 如果 numberspinner 未初始化，尝试初始化后再设值
        if ($el.parent().find('.numberspinner-text').length > 0) {
            $el.parent().find('.numberspinner-text').val(val);
        }
    }

    function syncSpinner(name, val) {
        setSpinnerValue(name, val);
    }

    // 打开图片位置编辑弹窗
    function openImagePositioner() {
        var seedId = parseInt($('#stageSeedId').val());
        var stageOrder = parseInt($('#stageEditorForm input[name="stageOrder"]').val()) || 1;

        if (!seedId || seedId <= 0) {
            $.messager.alert('提示', '请先保存种子信息');
            return;
        }

        // 先打开弹窗（否则容器宽高为0）
        $('#positionDialog').dialog('open').dialog('center');

        // 设置基底图片
        $('#positionBg').attr('src', '/images/positioning.png?t=' + new Date().getTime());

        // 构建阶段图片路径
        // 枯萎：统一用 /images/crops/basic/9.png，不拼接种子ID
        // stage 1：用 /images/crops/basic/0.png
        // 其余阶段：用已保存的 imageUrl 或按种子ID+阶段序号拼接
        var savedUrl = $.trim($('#stageEditorForm input[name="imageUrl"]').val());
        var cropPath;
        if (currentStageCropStatus === '枯萎') {
            cropPath = '/images/crops/basic/9.png';
        } else if (stageOrder === 1) {
            cropPath = '/images/crops/basic/0.png';
        } else {
            // 校验 savedUrl 是否属于当前种子（排除指向其他种子目录的脏数据）
            var expectedPrefix = '/images/crops/' + seedId + '/';
            var isValidSaved = savedUrl && savedUrl.indexOf(expectedPrefix) === 0;
            cropPath = isValidSaved ? savedUrl : ('/images/crops/' + seedId + '/' + stageOrder + '.png');
        }

        var land = getPositionerLandArea();
        // 读取表单中的像素值（用 getSpinnerValue 兼容 EasyUI numberspinner）
        var pxW = getSpinnerValue('imageWidth') || Math.round(land.width * 0.68);
        var pxH = getSpinnerValue('imageHeight') || Math.round(land.height * 0.68);
        var pxX = getSpinnerValue('imageOffsetX') || 0;
        var pxY = getSpinnerValue('imageOffsetY') || 0;

        // 只限制最小尺寸，不限制位置（允许超出土地区域）
        pxW = Math.max(10, pxW);
        pxH = Math.max(10, pxH);

        // 转换为容器坐标：加上土地区域偏移
        $('#stageOverlay').css({
            width: pxW, height: pxH,
            left: pxX + land.left, top: pxY + land.top,
            display: 'block'
        });

        // 销毁旧的可拖拽/缩放实例
        try { $('#stageOverlay').resizable('destroy'); } catch(e) {}
        try { $('#stageOverlay').draggable('destroy'); } catch(e) {}

        // 获取 positioning.png 在容器内的完整显示区域，作为拖拽/缩放边界
        function getPositionerImageBounds() {
            var cw = 440, ch = 440;
            var imgW = 200, imgH = 300;
            var imgRatio = imgW / imgH;
            var displayH = ch;
            var displayW = cw * imgRatio;     // 293
            var offsetLeft = (cw - displayW) / 2; // 74
            return { left: offsetLeft, top: 0, width: displayW, height: displayH };
        }

        // 绑定图片加载完成事件：拖拽/缩放限制在完整 positioning.png 显示区域内
        var img = $('#stageOverlay');
        img.off('load.positioner');
        img.on('load.positioner', function() {
            var imageBounds = getPositionerImageBounds();
            var bounds = [imageBounds.left, imageBounds.top,
                          imageBounds.left + imageBounds.width, imageBounds.top + imageBounds.height];
            $(this).draggable({
                containment: bounds,
                drag: updateFormFromOverlay
            }).resizable({
                containment: bounds,
                handles: 'all',
                resize: updateFormFromOverlay,
                aspectRatio: true
            });
            updateFormFromOverlay();
        });

        img.attr('src', cropPath + '?t=' + new Date().getTime());
        // 加载失败时兜底为空白图
        img.one('error', function() {
            if (this.src.indexOf('/images/crops/basic/blank.png') === -1) {
                this.src = '/images/crops/basic/blank.png';
            }
        });

        // 处理已缓存的图片（load事件已触发过）
        if (img[0].complete) {
            img.trigger('load.positioner');
        }

        // 自动填充图片路径字段
        $('#stageEditorForm input[name="imageUrl"]').val(cropPath);
    }

    // 确定 → 读取定位器位置 → 关闭定位器 → 刷新成长阶段详情表单（不保存到DB）
    function gainPostion() {
        // 直接从 overlay 读取最终位置
        var overlay = $('#stageOverlay');
        var w = Math.round(overlay.width());
        var h = Math.round(overlay.height());
        var x = parseInt(overlay.css('left')) || 0;
        var y = parseInt(overlay.css('top')) || 0;
        var land = getPositionerLandArea();
        var rx = Math.round(x - land.left);
        var ry = Math.round(y - land.top);

        // 先关闭定位弹窗
        $('#positionDialog').dialog('close');

        // 收集表单当前所有值，合并定位字段的新值，用 form('load') 整体刷新
        // 这样 EasyUI numberspinner/textbox 等组件都会正确更新显示
        var formData = {};
        $('#stageEditorForm').serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });
        formData.imageWidth = w;
        formData.imageHeight = h;
        formData.imageOffsetX = rx;
        formData.imageOffsetY = ry;

        $('#stageEditorForm').form('load', formData);

        $.messager.show({ title: '已更新', msg: '图片位置已更新到表单，请在成长阶段详情中点击保存' });
    }
</script>
</body>
